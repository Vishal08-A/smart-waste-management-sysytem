version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: waste-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: waste-backend
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/waste
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: waste-frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:


